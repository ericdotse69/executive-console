<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT // EXECUTIVE CONSOLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* DYNAMIC ROOT VARIABLES */
        :root { 
            --bg: #000000; 
            --card-bg: rgba(5, 5, 5, 0.8); /* SET TO TRANSPARENT */
            --primary: #00ff41; 
            --text: var(--primary); 
            --border: rgba(0, 255, 65, 0.3); 
            --accent: rgba(0, 255, 65, 0.6); 
            --scanline: rgba(0, 255, 65, 0.05);
            --danger: #ff003c; 
        }
        
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            background-image: linear-gradient(var(--scanline) 1px, transparent 1px);
            background-size: 100% 3px;
            transition: all 0.2s ease;
        }

        .container { 
            width: 100%; 
            max-width: 650px; 
            background: var(--card-bg); 
            /* THE HUD EFFECT */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px; 
            border: 1px solid var(--border); 
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 15px var(--scanline); 
            margin-top: 20px; 
            transition: all 0.2s ease;
        }

        .header-container { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px dashed var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        
        h2 { color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin: 0; text-shadow: 0 0 8px var(--scanline); }
        .badge { font-size: 0.6rem; background: var(--danger); color: #000; padding: 4px 8px; display: inline-block; font-weight: bold; box-shadow: 0 0 5px var(--danger); margin-top: 5px; }

        .color-selector { background: rgba(0,0,0,0.5); color: var(--primary); border: 1px dashed var(--primary); padding: 5px; font-size: 0.6rem; cursor: pointer; outline: none; width: 100%; margin-top: 5px; }
        .color-selector option { background: #000; color: #fff; }

        .avatar-wrapper { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .avatar-box { width: 50px; height: 50px; border: 1px solid var(--primary); background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; color: var(--primary); box-shadow: 0 0 15px var(--scanline); transition: 0.2s ease; }
        .avatar-box svg { width: 35px; height: 35px; }
        .avatar-dropdown { background: rgba(0,0,0,0.8); color: var(--primary); border: 1px dashed var(--primary); font-size: 0.6rem; padding: 2px 5px; width: 120px; text-align: right; }

        .textarea-container { position: relative; margin-bottom: 20px; }
        textarea { width: 100%; height: 140px; background: rgba(0,0,0,0.4); color: var(--text); border: 1px solid var(--border); padding: 15px; outline: none; resize: vertical; transition: 0.2s ease; font-size: 0.8rem; line-height: 1.4; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--scanline); }
        
        #drop-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border: 2px dashed var(--primary); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; letter-spacing: 2px; text-align: center; opacity: 0; pointer-events: none; transition: 0.2s; z-index: 10; }
        #drop-zone.active { opacity: 1; pointer-events: all; box-shadow: inset 0 0 30px var(--scanline); }

        .panel { background: rgba(2,2,2,0.4); border: 1px solid var(--border); padding: 15px; margin-bottom: 20px; transition: 0.2s ease; }
        .panel-title { font-size: 0.7rem; color: var(--primary); letter-spacing: 2px; margin-bottom: 10px; display: block; font-weight: bold; border-bottom: 1px dashed var(--border); padding-bottom: 5px; text-shadow: 0 0 5px var(--scanline); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-size: 0.7rem; color: var(--accent); display: block; margin-bottom: 5px; text-transform: uppercase; transition: 0.2s ease; }
        select, input[type="range"], input[type="file"] { width: 100%; padding: 8px; background: rgba(0,0,0,0.5); color: var(--primary); border: 1px solid var(--border); outline: none; font-size: 0.8rem; transition: 0.2s ease; }
        input[type="file"] { border: 1px dashed var(--primary); cursor: pointer; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border: 1px solid var(--primary); font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; font-size: 0.8rem; }
        .btn-play { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--scanline); }
        .btn-play:hover { background: transparent; color: var(--primary); box-shadow: inset 0 0 15px var(--primary); }
        .btn-pause { background: transparent; color: #eab308; border-color: #eab308; }
        .btn-pause:hover { background: rgba(234, 179, 8, 0.1); box-shadow: inset 0 0 10px #eab308;}
        .btn-stop { background: transparent; color: var(--danger); border-color: var(--danger); }
        .btn-stop:hover { background: rgba(255, 0, 60, 0.1); box-shadow: inset 0 0 15px var(--danger); }
        
        #status-indicator { font-size: 0.7rem; color: var(--accent); text-align: right; margin-top: 10px; font-weight: bold; letter-spacing: 1px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <div>
            <h2>AUDIO // MIXER</h2>
            <span class="badge">ROOT PRIVILEGES ACTIVE</span>
            <div style="margin-top: 10px;">
                <select id="color-select" class="color-selector">
                    <option value="#00ff41">>> OPTICS: TOXIC GREEN (G)</option>
                    <option value="#ff0000">>> OPTICS: SYSTEM RED (R)</option>
                    <option value="#ff7700">>> OPTICS: HAZARD ORANGE (O)</option>
                    <option value="#ffea00">>> OPTICS: WARNING YELLOW (Y)</option>
                    <option value="#00d4ff">>> OPTICS: DEEP WEB BLUE (B)</option>
                    <option value="#6600ff">>> OPTICS: NEON INDIGO (I)</option>
                    <option value="#b800ff">>> OPTICS: CYBER VIOLET (V)</option>
                </select>
            </div>
        </div>
        <div class="avatar-wrapper">
            <div id="avatar-display" class="avatar-box"></div>
            <select id="avatar-select" class="avatar-dropdown">
                <option value="ghost">GHOST PROTOCOL</option>
                <option value="reaper">THE REAPER</option>
                <option value="machine">MACHINE MIND</option>
            </select>
        </div>
    </div>
    
    <div class="textarea-container" id="drop-container">
        <div id="drop-zone">[ DROP ENCRYPTED .PDF HERE TO EXTRACT ]</div>
        <textarea id="text-input" placeholder="> INJECT RAW DATA OR DROP PDF HERE..."></textarea>
    </div>
    
    <div class="panel">
        <span class="panel-title">SYS.UPLINK // LINGUISTIC DECRYPTION (REQUIRES NETWORK)</span>
        <div class="controls">
            <div>
                <label>> TARGET_DIALECT</label>
                <select id="translate-lang">
                    <option value="es">>> SPANISH (es)</option>
                    <option value="fr">>> FRENCH (fr)</option>
                    <option value="de">>> GERMAN (de)</option>
                    <option value="ja">>> JAPANESE (ja)</option>
                    <option value="ru">>> RUSSIAN (ru)</option>
                </select>
            </div>
            <div>
                <label>> INITIATE_OVERRIDE</label>
                <button id="btn-translate" style="padding: 8px; font-size: 0.7rem; width: 100%; border: 1px dashed var(--primary); background: transparent; color: var(--primary);">ESTABLISH UPLINK</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <span class="panel-title">SYS.TRACK_01 // NARRATION</span>
        <div class="controls">
            <div style="grid-column: span 2;">
                <label>> SELECT_VOCAL_NODE</label>
                <select id="voice-select"></select>
            </div>
            <div>
                <label>> PACING: <span id="rate-val">1.0</span></label>
                <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
            </div>
            <div>
                <label>> TONE: <span id="pitch-val">1.0</span></label>
                <input type="range" id="pitch" min="0" max="2" value="1" step="0.1">
            </div>
        </div>
    </div>

    <div class="panel">
        <span class="panel-title">SYS.TRACK_02 // ENVIRONMENT & MUSIC</span>
        <div class="controls">
            <div style="grid-column: span 2;">
                <label>> OVERRIDE_SCENERY</label>
                <select id="ambient-select">
                    <option value="none">>> NULL (SILENCE)</option>
                    <option value="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3">>> WOODS & WATER (SPRING)</option>
                    <option value="https://cdn.pixabay.com/download/audio/2022/10/25/audio_24867dd116.mp3?filename=cyberpunk-2099-10701.mp3">>> HARDCORE DJ (CYBERPUNK BEAT)</option>
                    <option value="https://cdn.pixabay.com/download/audio/2022/03/15/audio_517d47bf14.mp3?filename=police-siren-loop-7132.mp3">>> NYPD EMERGENCY SIRENS</option>
                    <option value="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=heavy-rain-nature-sounds-8186.mp3">>> HEAVY PRECIPITATION</option>
                    <option value="https://cdn.pixabay.com/download/audio/2022/03/24/audio_3a9fc192fa.mp3?filename=cinematic-drone-whoosh-114034.mp3">>> ORBITAL BOMBARDMENT</option>
                    <option value="custom" id="custom-option" style="display:none;">>> CUSTOM LOCAL AUDIO ACTIVE</option>
                </select>
            </div>
            <div style="grid-column: span 2;">
                <label>> UPLOAD_CUSTOM_AUDIO (MP3/WAV)</label>
                <input type="file" id="custom-audio" accept="audio/*">
            </div>
            <div style="grid-column: span 2;">
                <label>> AMBIENT_GAIN: <span id="volume-val">20%</span></label>
                <input type="range" id="ambient-volume" min="0" max="1" value="0.2" step="0.05">
            </div>
        </div>
    </div>

    <audio id="ambient-player" loop crossorigin="anonymous"></audio>

    <div class="btn-group">
        <button class="btn-play" id="btn-speak">EXECUTE</button>
        <button class="btn-pause" id="btn-pause">HALT</button>
        <button class="btn-stop" id="btn-stop">KILL PROCESS</button>
    </div>

    <div id="status-indicator">SYS.STATUS: AWAITING INPUT...</div>
</div>

<script>
    // --- PDF DECRYPTION ENGINE ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    const dropContainer = document.getElementById('drop-container');
    const dropZone = document.getElementById('drop-zone');
    const textInput = document.getElementById('text-input');
    const statusIndicator = document.getElementById('status-indicator');

    dropContainer.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('active'); });
    dropContainer.addEventListener('dragleave', () => { dropZone.classList.remove('active'); });

    dropContainer.addEventListener('drop', async (e) => {
        e.preventDefault(); dropZone.classList.remove('active');
        const file = e.dataTransfer.files[0];
        if (file && file.type === "application/pdf") {
            statusIndicator.innerText = "SYS.STATUS: DECRYPTING PDF...";
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let extractedText = "";
                // UPGRADED TO 50 PAGES
                for (let i = 1; i <= Math.min(pdf.numPages, 50); i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    extractedText += content.items.map(item => item.str).join(' ') + "\n\n";
                }
                textInput.value = extractedText;
                statusIndicator.innerText = "SYS.STATUS: PDF DATA EXTRACTED.";
            };
            reader.readAsArrayBuffer(file);
        }
    });

    // --- RAINBOW SPECTRUM OVERRIDE ENGINE ---
    const colorSelect = document.getElementById('color-select');
    const root = document.documentElement;

    function applyOptics(hex) {
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        root.style.setProperty('--primary', hex);
        root.style.setProperty('--cb', `rgba(${r}, ${g}, ${b}, 0.15)`); /* THE TRANSPARENT HUD BACKGROUND */
        root.style.setProperty('--border', `rgba(${r}, ${g}, ${b}, 0.3)`);
        root.style.setProperty('--accent', `rgba(${r}, ${g}, ${b}, 0.6)`);
        root.style.setProperty('--scanline', `rgba(${r}, ${g}, ${b}, 0.1)`);
        colorSelect.style.color = hex; colorSelect.style.borderColor = hex;
        updateAvatar(); 
    }
    colorSelect.addEventListener('change', (e) => applyOptics(e.target.value));

    // --- AVATAR ENGINE ---
    const avatars = {
        ghost: `<svg viewBox="0 0 100 100"><path d="M 20 90 L 20 50 Q 50 0 80 50 L 80 90 Z" fill="none" stroke="currentColor" stroke-width="4"/><line x1="35" y1="55" x2="65" y2="55" stroke="currentColor" stroke-width="4"/><line x1="50" y1="55" x2="50" y2="75" stroke="currentColor" stroke-width="4"/></svg>`,
        reaper: `<svg viewBox="0 0 100 100"><polygon points="20,20 80,20 70,60 60,90 40,90 30,60" fill="none" stroke="currentColor" stroke-width="4"/><rect x="35" y="40" width="10" height="10" fill="currentColor"/><rect x="55" y="40" width="10" height="10" fill="currentColor"/><line x1="40" y1="75" x2="60" y2="75" stroke="currentColor" stroke-width="3"/></svg>`,
        machine: `<svg viewBox="0 0 100 100" style="color: var(--danger);"><circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="4"/><circle cx="50" cy="50" r="15" fill="currentColor"/><line x1="50" y1="10" x2="50" y2="30" stroke="currentColor" stroke-width="4"/><line x1="50" y1="70" x2="50" y2="90" stroke="currentColor" stroke-width="4"/></svg>`
    };
    const avatarDisplay = document.getElementById('avatar-display'), avatarSelect = document.getElementById('avatar-select');
    function updateAvatar() {
        const selected = avatarSelect.value; avatarDisplay.innerHTML = avatars[selected];
        if (selected === 'machine') { avatarDisplay.style.borderColor = 'var(--danger)'; avatarDisplay.style.boxShadow = '0 0 15px var(--danger)'; }
        else { avatarDisplay.style.borderColor = 'var(--primary)'; avatarDisplay.style.boxShadow = '0 0 15px var(--scanline)'; }
    }
    avatarSelect.addEventListener('change', updateAvatar); updateAvatar(); 

    // --- NATIVE SPEECH & AMBIENT ENGINE ---
    const synth = window.speechSynthesis, voiceSelect = document.getElementById('voice-select');
    const rateInput = document.getElementById('rate'), pitchInput = document.getElementById('pitch');
    const ambientPlayer = document.getElementById('ambient-player'), ambientSelect = document.getElementById('ambient-select'), ambientVolume = document.getElementById('ambient-volume');

    let voices = [];
    function populateVoiceList() {
        voices = synth.getVoices(); voiceSelect.innerHTML = '';
        voices.forEach((voice) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})`;
            option.setAttribute('data-name', voice.name);
            option.setAttribute('data-lang', voice.lang);
            voiceSelect.appendChild(option);
        });
    }
    populateVoiceList(); if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

    ambientVolume.addEventListener('input', () => { ambientPlayer.volume = ambientVolume.value; });

    document.getElementById('custom-audio').addEventListener('change', function(e) {
        if (e.target.files[0]) {
            ambientPlayer.src = URL.createObjectURL(e.target.files[0]);
            document.getElementById('custom-option').style.display = 'block';
            ambientSelect.value = "custom";
        }
    });

    // --- LINGUISTIC UPLINK ---
    document.getElementById('btn-translate').addEventListener('click', async () => {
        const text = textInput.value.trim();
        if (!text) return;
        statusIndicator.innerText = "SYS.STATUS: UPLINKING...";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${document.getElementById('translate-lang').value}`);
            const data = await res.json();
            textInput.value = data.responseData.translatedText;
            statusIndicator.innerText = "SYS.STATUS: DECRYPTED.";
        } catch (e) { statusIndicator.innerText = "SYS.STATUS: UPLINK FAILED."; }
    });

    // --- MASTER CONTROLS ---
    function masterPlay() {
        if (synth.speaking && !synth.paused) return;
        if (synth.paused) { synth.resume(); if (ambientSelect.value !== "none") ambientPlayer.play(); return; }

        if (textInput.value !== '') {
            const utterance = new SpeechSynthesisUtterance(textInput.value);
            utterance.voice = voices.find(v => v.name === voiceSelect.selectedOptions[0].getAttribute('data-name'));
            utterance.pitch = pitchInput.value; utterance.rate = rateInput.value;

            if (ambientSelect.value !== "none") {
                if (ambientSelect.value !== "custom") ambientPlayer.src = ambientSelect.value;
                ambientPlayer.play();
            }

            utterance.onstart = () => { statusIndicator.innerText = "SYS.STATUS: TRANSMITTING..."; };
            utterance.onend = () => masterStop();
            synth.speak(utterance);
        }
    }

    function masterStop() { synth.cancel(); ambientPlayer.pause(); ambientPlayer.currentTime = 0; statusIndicator.innerText = "SYS.STATUS: READY."; }

    document.getElementById('btn-speak').addEventListener('click', masterPlay);
    document.getElementById('btn-pause').addEventListener('click', () => { synth.pause(); ambientPlayer.pause(); statusIndicator.innerText = "HALTED"; });
    document.getElementById('btn-stop').addEventListener('click', masterStop);
</script>
</body>
</html>
